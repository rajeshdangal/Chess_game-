name: Build Chess Game

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller pygame
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --add-data "assets;assets" --add-data "game;game" game/main.py --name ChessGame
    
    - name: Get version
      id: version
      run: |
        echo "VERSION=$(date +'%Y.%m.%d-%H%M%S')" >> $env:GITHUB_OUTPUT
    
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: dist/ChessGame.exe
        tag: v${{ steps.version.outputs.VERSION }}
        name: Automatic Build ${{ steps.version.outputs.VERSION }}
        body: |
          ## Automatic release from main branch
          - Commit: ${{ github.sha }}
          - Build time: ${{ steps.version.outputs.VERSION }}
          - Triggered by: Push to main branch
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        removeArtifacts: true