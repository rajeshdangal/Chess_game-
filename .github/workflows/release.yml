name: Build Chess Game

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller pygame
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --add-data "assets;assets" --add-data "game;game" game/main.py --name ChessGame
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/ChessGame.exe
        tag_name: continuous-build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        body: |
          ## Auto-built from main branch
          - Commit: ${{ github.sha }}
          - Build #: ${{ github.run_number }}
          - Triggered by: Push to main branch
        draft: false
        prerelease: true