name: Build Chess Game

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller pygame
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --add-data "assets;assets" --add-data "game;game" game/main.py --name ChessGame
    
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: dist/ChessGame.exe
        tag: auto-build-${{ github.run_number }}
        name: Automatic Build ${{ github.run_number }}
        body: |
          ## 🎲 Automatic Chess Game Build
          - **Commit:** `${{ github.sha }}`
          - **Trigger:** Push to main branch
          - **Build #:** ${{ github.run_number }}
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true  # Add this to replace old artifacts